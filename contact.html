    <!-- Contact Page Content -->
    <main>
        <section id="contact">
            <div class="container">
                <div class="section-card">
                    <h2>📬 Let's Connect</h2>
                    <p class="contact-intro">I'm open to collaborations, and design projects. Let's create something amazing together!</p>
                    
                   
                    <div class="contact-form-container">
                        
                        <form id="contactForm" class="contact-form" action="https://formspree.io/f/xbdqrylj" method="POST">
                            <div class="form-group">
                                <label for="name">Full Name *</label>
                                <input type="text" id="name" name="name" placeholder="Enter your full name">
                                <span class="error-message" id="nameError"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" name="_replyto" placeholder="Enter your email address">
                                <span class="error-message" id="emailError"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="message">Message *</label>
                                <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
                                <span class="error-message" id="messageError"></span>
                            </div>
                            
                            
                            <input type="hidden" name="_to" value="mudzami.maka@gmail.com">
                            <input type="hidden" name="_subject" value="New Message from Portfolio">
                            
                            <button type="submit" class="submit-btn">📧 Send Message</button>
                            <div id="formSuccess" class="form-success"></div>
                        </form>
                    </div>
                    
                    <!-- Social Media Icons -->
                    <div class="social-divider">
                        <span>Or connect with me on social media</span>
                    </div>
